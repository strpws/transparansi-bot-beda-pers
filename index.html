<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bot transparansi editorial Beda Nasib Pers" />
    <title>Transparansi Bot: Beda Nasib Pers</title>
    <link rel="icon" href="logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-card" aria-label="Chatbot">
        <header class="chat-header">
          <div class="bot-avatar" aria-hidden="true"><img src="logo.png" alt="" /></div>
          <div class="identity">
            <h1>Transparansi Bot: Beda Nasib Pers</h1>
            <p><span id="statusDot" class="status-dot loading"></span><span id="statusText">Memuat data...</span></p>
          </div>
          <div class="language-switch" role="group" aria-label="Pilih bahasa">
            <button type="button" data-language="id" class="active" aria-pressed="true">ID</button>
            <button type="button" data-language="en" aria-pressed="false">EN</button>
          </div>
          <button id="reloadButton" class="icon-button" type="button" title="Muat ulang data" aria-label="Muat ulang data">↻</button>
        </header>

        <div id="messages" class="messages" role="log" aria-live="polite"></div>
        <div id="suggestions" class="suggestions" aria-label="Saran pertanyaan"></div>

        <form id="chatForm" class="chat-form">
          <label class="sr-only" for="questionInput">Ketik pertanyaan</label>
          <input id="questionInput" name="question" type="text" autocomplete="off" placeholder="Ketik pertanyaan..." maxlength="300" />
          <button id="sendButton" type="submit" aria-label="Kirim pertanyaan">➤</button>
        </form>
        <p id="credit" class="credit">Jawaban bersumber dari lembar transparansi editorial</p>
        <p id="copyright" class="copyright">© 2026 Irene Sarwindaningrum untuk Kompas.id</p>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
